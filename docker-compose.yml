services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-taranis}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_local_only}
      POSTGRES_DB: ${POSTGRES_DB:-dataroom}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-taranis} -d ${POSTGRES_DB:-dataroom}"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ./packages/api
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: development
      API_PORT: 4000
      POSTGRES_USER: ${POSTGRES_USER:-taranis}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_local_only}
      POSTGRES_DB: ${POSTGRES_DB:-dataroom}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      JWT_SECRET: ${JWT_SECRET:-local-dev-secret-do-not-use-in-production}
    ports:
      - "4000:4000"
    volumes:
      - ./packages/api/src:/app/src
    command: npm run dev

  web:
    build:
      context: ./packages/web
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    environment:
      VITE_API_URL: http://localhost:4000
    ports:
      - "5173:5173"
    volumes:
      - ./packages/web/src:/app/src
      - ./packages/web/index.html:/app/index.html
    command: npm run dev

volumes:
  pgdata:
